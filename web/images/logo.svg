<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 80" width="600" height="80" role="img">
<title>Metis Antique Marketplace Plus</title>
<desc>Treasure chest wordmark logo for Metis Antique Marketplace Plus</desc>

<rect width="600" height="80" rx="10" fill="#140c00"/>

<!-- Treasure chest icon (58x58, vertically centred at y=11) -->
<g transform="translate(12,11)">
  <!-- lid glow -->
  <path d="M4,30 Q4,10 29,10 Q54,10 54,30" fill="#FFB300" opacity=".07"/>
  <!-- lid arc -->
  <path d="M4,30 Q4,10 29,10 Q54,10 54,30" fill="none" stroke="#F57F17" stroke-width="2.5" stroke-linecap="round"/>
  <!-- lid straps -->
  <line x1="16" y1="10" x2="16" y2="58" stroke="#F57F17" stroke-width="1.4"/>
  <line x1="42" y1="10" x2="42" y2="58" stroke="#F57F17" stroke-width="1.4"/>
  <!-- lid horizontal band -->
  <path d="M4,22 Q29,28 54,22" fill="none" stroke="#F57F17" stroke-width="1" opacity=".4"/>
  <!-- chest body -->
  <rect x="4" y="30" width="50" height="28" rx="4" fill="none" stroke="#F57F17" stroke-width="2.5"/>
  <!-- plank lines -->
  <line x1="4" y1="41" x2="54" y2="41" stroke="#F57F17" stroke-width="0.9" opacity=".3"/>
  <line x1="4" y1="51" x2="54" y2="51" stroke="#F57F17" stroke-width="0.9" opacity=".3"/>
  <!-- lock body -->
  <rect x="21" y="36" width="16" height="13" rx="3" fill="none" stroke="#FFB300" stroke-width="2"/>
  <!-- lock shackle -->
  <path d="M23,36 Q23,28 29,28 Q35,28 35,36" fill="none" stroke="#FFB300" stroke-width="2"/>
  <!-- keyhole -->
  <circle cx="29" cy="41" r="2.5" fill="none" stroke="#FFB300" stroke-width="1.4"/>
  <line x1="29" y1="44" x2="29" y2="47" stroke="#FFB300" stroke-width="1.4" stroke-linecap="round"/>
  <!-- rivets -->
  <circle cx="9"  cy="35" r="2.5" fill="#FFB300"/>
  <circle cx="49" cy="35" r="2.5" fill="#FFB300"/>
  <circle cx="9"  cy="55" r="2.5" fill="#FFB300"/>
  <circle cx="49" cy="55" r="2.5" fill="#FFB300"/>
</g>

<!-- Divider -->
<line x1="86" y1="12" x2="86" y2="68" stroke="#F57F17" stroke-width="1" opacity=".4"/>

<!-- METIS label -->
<text x="100" y="34" font-family="Georgia,serif" font-size="13" font-weight="400" fill="#aaa" letter-spacing="5">METIS</text>
<!-- Main wordmark -->
<text x="100" y="64" font-family="Georgia,serif" font-size="28" font-weight="700" fill="#F57F17" letter-spacing="0.5">Antique Marketplace Plus</text>
</svg>
