<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Antique Shop</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
    --bg: #faf8f4; --bg2: #ffffff; --bg3: #f3efe8;
    --border: #e0d8cc; --text: #1a1714; --text2: #6b6355;
    --accent: #8b6340; --accent2: #b8854f;
    --green: #2d7a4f; --red: #b83232; --amber: #9a7020;
    --radius: 8px;
}
body { background: var(--bg); color: var(--text); font: 15px/1.6 Georgia, 'Times New Roman', serif; }
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

/* Header */
.shop-header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 50;
    box-shadow: 0 1px 8px rgba(0,0,0,.06);
}
.shop-logo { font-size: 22px; font-weight: 600; color: var(--accent); letter-spacing: .02em; }
.shop-logo span { color: var(--text2); font-weight: 400; font-size: 14px; margin-left: 8px; }
.header-search {
    display: flex; gap: 8px; flex: 1; max-width: 420px; margin: 0 32px;
}
.header-search input {
    flex: 1; padding: 8px 14px; border: 1px solid var(--border); border-radius: 20px;
    font: 14px Georgia, serif; background: var(--bg3); color: var(--text); outline: none;
}
.header-search input:focus { border-color: var(--accent); }
.header-search button {
    padding: 8px 16px; background: var(--accent); color: #fff; border: none;
    border-radius: 20px; cursor: pointer; font-size: 13px;
}
.header-search button:hover { background: var(--accent2); }

/* Layout */
.shop-body { max-width: 1200px; margin: 0 auto; padding: 28px 24px; display: flex; gap: 28px; }

/* Sidebar filter */
.shop-sidebar { width: 200px; flex-shrink: 0; }
.shop-sidebar h3 { font-size: 12px; letter-spacing: .1em; text-transform: uppercase; color: var(--text2); margin-bottom: 12px; }
.cat-list { list-style: none; display: flex; flex-direction: column; gap: 2px; }
.cat-item {
    padding: 7px 12px; cursor: pointer; border-radius: var(--radius);
    font-size: 14px; color: var(--text2); border: 1px solid transparent;
    transition: all .1s;
}
.cat-item:hover { background: var(--bg3); color: var(--text); }
.cat-item.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.cat-count { float: right; font-size: 12px; opacity: .7; }

/* Grid */
.shop-main { flex: 1; min-width: 0; }
.results-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
.results-count { font-size: 14px; color: var(--text2); }
.listing-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }

/* Card */
.listing-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
    overflow: hidden; cursor: pointer; transition: box-shadow .15s, transform .1s;
}
.listing-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,.1); transform: translateY(-2px); }
.card-img {
    width: 100%; aspect-ratio: 4/3; object-fit: cover; display: block; background: var(--bg3);
}
.card-img-placeholder {
    width: 100%; aspect-ratio: 4/3; background: var(--bg3);
    display: flex; align-items: center; justify-content: center;
    font-size: 40px; color: var(--border);
}
.card-body { padding: 14px; }
.card-title { font-size: 15px; font-weight: 600; margin-bottom: 3px; line-height: 1.3; }
.card-meta { font-size: 12px; color: var(--text2); margin-bottom: 8px; }
.card-price { font-size: 18px; font-weight: 600; color: var(--accent); }
.card-price .list-type { font-size: 11px; font-weight: 400; color: var(--text2); margin-left: 6px; }
.card-condition { font-size: 11px; margin-top: 6px; }
.cond-badge {
    display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px;
    background: var(--bg3); color: var(--text2); border: 1px solid var(--border);
}

/* Detail page */
.detail-page { display: none; }
.back-btn {
    display: inline-flex; align-items: center; gap: 6px; color: var(--text2);
    font-size: 14px; cursor: pointer; margin-bottom: 20px;
    background: none; border: none; padding: 6px 0;
}
.back-btn:hover { color: var(--accent); }
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 36px; }
@media (max-width: 700px) { .detail-grid { grid-template-columns: 1fr; } }

/* Photo gallery */
.photo-main { width: 100%; aspect-ratio: 4/3; object-fit: contain; border-radius: var(--radius); border: 1px solid var(--border); background: var(--bg3); cursor: zoom-in; }
.photo-thumbs { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
.photo-thumb {
    width: 64px; height: 64px; object-fit: cover; border-radius: 5px;
    border: 2px solid transparent; cursor: pointer; transition: border-color .1s;
}
.photo-thumb.active { border-color: var(--accent); }
.photo-placeholder { width: 100%; aspect-ratio: 4/3; background: var(--bg3); border-radius: var(--radius); display: flex; align-items: center; justify-content: center; font-size: 60px; color: var(--border); }

/* Info panel */
.detail-title { font-size: 26px; font-weight: 600; line-height: 1.2; margin-bottom: 8px; }
.detail-price { font-size: 28px; font-weight: 600; color: var(--accent); margin-bottom: 16px; }
.detail-price .price-type { font-size: 14px; font-weight: 400; color: var(--text2); }
.detail-fields { display: grid; grid-template-columns: auto 1fr; gap: 6px 16px; margin-bottom: 18px; border-top: 1px solid var(--border); padding-top: 16px; }
.field-label { font-size: 12px; color: var(--text2); font-style: italic; }
.field-value { font-size: 14px; }
.detail-desc { margin-bottom: 20px; }
.detail-desc h3 { font-size: 14px; color: var(--text2); margin-bottom: 8px; text-transform: uppercase; letter-spacing: .06em; }
.detail-desc p { font-size: 14px; line-height: 1.7; white-space: pre-wrap; }

/* Inquiry form */
.inquiry-card {
    background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px;
    margin-top: 24px;
}
.inquiry-card h3 { font-size: 16px; margin-bottom: 14px; }
.form-row { display: flex; gap: 10px; }
.form-row .fg { flex: 1; }
.fg { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
.fg label { font-size: 12px; color: var(--text2); }
.fg input, .fg textarea, .fg select {
    padding: 9px 12px; border: 1px solid var(--border); border-radius: 5px;
    font: 14px Georgia, serif; background: var(--bg2); color: var(--text); outline: none;
    transition: border-color .15s;
}
.fg input:focus, .fg textarea:focus { border-color: var(--accent); }
.fg textarea { resize: vertical; min-height: 90px; }
.btn-inquire {
    width: 100%; padding: 12px; background: var(--accent); color: #fff; border: none;
    border-radius: var(--radius); font: 15px Georgia, serif; cursor: pointer;
    transition: background .15s;
}
.btn-inquire:hover { background: var(--accent2); }
.inquiry-success { background: #e8f5ee; border: 1px solid var(--green); border-radius: var(--radius); padding: 14px; color: var(--green); font-size: 14px; text-align: center; }
.inquiry-error  { background: #fdeaea; border: 1px solid var(--red); border-radius: var(--radius); padding: 10px; color: var(--red); font-size: 13px; }

/* Thread (buyer can view replies sent to them) */
.thread-section { margin-top: 20px; }
.thread-section h3 { font-size: 13px; color: var(--text2); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 12px; }
.thread-msg {
    padding: 10px 14px; border-radius: 8px; margin-bottom: 8px;
    border: 1px solid var(--border);
}
.thread-msg.dealer { background: var(--bg2); }
.thread-msg.buyer  { background: var(--bg3); }
.thread-msg .msg-meta { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
.thread-msg .msg-body { font-size: 14px; white-space: pre-wrap; }
.thread-reply-box { display: flex; gap: 8px; margin-top: 12px; }
.thread-reply-box textarea { flex: 1; resize: none; min-height: 60px; }
.btn-reply { padding: 8px 18px; background: var(--accent); color: #fff; border: none; border-radius: 5px; font: 14px Georgia, serif; cursor: pointer; align-self: flex-end; }

/* Pagination */
.pagination { display: flex; justify-content: center; gap: 8px; margin-top: 32px; }
.page-btn { padding: 8px 16px; border: 1px solid var(--border); border-radius: 5px; cursor: pointer; font: 14px Georgia, serif; background: var(--bg2); color: var(--text2); }
.page-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.page-btn:hover:not(.active) { border-color: var(--accent); color: var(--accent); }

/* Lightbox */
#lightbox {
    position: fixed; inset: 0; background: rgba(0,0,0,.92); z-index: 999;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
}
#lightbox img { max-width: 92vw; max-height: 90vh; object-fit: contain; border-radius: 6px; }
#lightbox .lb-caption { position: absolute; bottom: 20px; color: rgba(255,255,255,.8); font-size: 14px; text-align: center; width: 100%; }
#lightbox .lb-close { position: absolute; top: 16px; right: 20px; color: #fff; font-size: 28px; cursor: pointer; line-height: 1; background: none; border: none; }

/* Empty / loading */
.empty-shop { text-align: center; padding: 80px 20px; color: var(--text2); }
.empty-shop .icon { font-size: 48px; margin-bottom: 12px; }
.loading { text-align: center; padding: 60px; color: var(--text2); font-style: italic; }

/* Footer */
.shop-footer { border-top: 1px solid var(--border); text-align: center; padding: 28px; color: var(--text2); font-size: 13px; margin-top: 48px; }
</style>
</head>
<body>

<header class="shop-header">
  <div class="shop-logo">&#9670; Antique Shop <span>Browse our collection</span></div>
  <div class="header-search">
    <input type="text" id="search-input" placeholder="Search antiques..." onkeydown="if(event.key==='Enter')Shop.search()">
    <button onclick="Shop.search()">Search</button>
  </div>
  <div>
    <a href="/index.html" style="font-size:13px;color:var(--text2)">Dealer login</a>
  </div>
</header>

<div class="shop-body">
  <!-- Sidebar -->
  <aside class="shop-sidebar">
    <h3>Categories</h3>
    <ul class="cat-list" id="cat-list">
      <li class="cat-item active" data-cat="" onclick="Shop.filterCat('')">All items</li>
    </ul>
  </aside>

  <!-- Main content -->
  <main class="shop-main">
    <!-- Grid page -->
    <div id="grid-page">
      <div class="results-header">
        <span class="results-count" id="results-count">Loading...</span>
      </div>
      <div id="listing-grid" class="listing-grid">
        <div class="loading">Loading listings...</div>
      </div>
      <div class="pagination" id="pagination"></div>
    </div>

    <!-- Detail page -->
    <div id="detail-page" class="detail-page">
      <button class="back-btn" onclick="Shop.showGrid()">&#x2190; Back to listings</button>
      <div id="detail-content"></div>
    </div>
  </main>
</div>

<!-- Lightbox -->
<div id="lightbox" style="display:none" onclick="Shop.closeLightbox(event)">
  <button class="lb-close" onclick="Shop.closeLightbox()">&#x2715;</button>
  <img id="lb-img" src="" alt="">
  <div class="lb-caption" id="lb-caption"></div>
</div>

<footer class="shop-footer">
  <p>Powered by Metis Antique Marketplace Plus &nbsp;|&nbsp; All items subject to prior sale</p>
</footer>

<script>
const Shop = (() => {
    let state = { page: 1, cat: '', q: '', total: 0, listings: [] };

    function esc(s) {
        return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function usd(v) { return '$'+parseFloat(v||0).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0}); }

    async function init() {
        await loadCategories();
        await loadListings(1);
        // Handle direct URL like /shop.html?listing=5
        const params = new URLSearchParams(location.search);
        if (params.get('listing')) showListing(params.get('listing'));
    }

    async function loadCategories() {
        const r = await fetch('/shop/categories');
        const cats = await r.json();
        const list = document.getElementById('cat-list');
        list.innerHTML = '<li class="cat-item active" data-cat="" onclick="Shop.filterCat(\'\')">All items</li>';
        cats.forEach(c => {
            const li = document.createElement('li');
            li.className = 'cat-item';
            li.dataset.cat = c.category;
            li.onclick = () => filterCat(c.category);
            li.innerHTML = esc(c.category) + '<span class="cat-count">' + c.count + '</span>';
            list.appendChild(li);
        });
    }

    async function loadListings(page) {
        state.page = page;
        let url = '/shop/listings?page=' + page;
        if (state.cat) url += '&category=' + encodeURIComponent(state.cat);
        if (state.q)   url += '&q=' + encodeURIComponent(state.q);
        const r = await fetch(url);
        const data = await r.json();
        state.total = data.total;
        state.listings = data.listings || [];
        renderGrid();
        renderPagination(page, data.total, data.limit);
    }

    function renderGrid() {
        const grid = document.getElementById('listing-grid');
        const count = document.getElementById('results-count');
        count.textContent = state.total + ' item' + (state.total !== 1 ? 's' : '') +
            (state.cat ? ' in ' + state.cat : '') +
            (state.q ? ' matching "' + esc(state.q) + '"' : '');

        if (!state.listings.length) {
            grid.innerHTML = '<div class="empty-shop" style="grid-column:1/-1"><div class="icon">&#x1F3FA;</div><p>No listings found</p></div>';
            return;
        }
        grid.innerHTML = state.listings.map(l => `
<div class="listing-card" onclick="Shop.showListing(${l.listing_id})">
  ${l.photo_url
    ? `<img class="card-img" src="${esc(l.photo_url)}" alt="${esc(l.title)}" loading="lazy">`
    : `<div class="card-img-placeholder">&#x1F3FA;</div>`}
  <div class="card-body">
    <div class="card-title">${esc(l.title)}</div>
    <div class="card-meta">${[l.era, l.maker, l.origin].filter(Boolean).map(esc).join(' &middot; ')}</div>
    <div class="card-price">${usd(l.price)}<span class="list-type">${l.list_type === 'auction' ? 'Auction' : ''}</span></div>
    <div class="card-condition"><span class="cond-badge">${esc(l.condition)}</span></div>
  </div>
</div>`).join('');
    }

    function renderPagination(page, total, limit) {
        const pages = Math.ceil(total / limit);
        const pag = document.getElementById('pagination');
        if (pages <= 1) { pag.innerHTML = ''; return; }
        let html = '';
        if (page > 1) html += `<button class="page-btn" onclick="Shop.loadListings(${page-1})">&#x2190;</button>`;
        for (let p = Math.max(1, page-2); p <= Math.min(pages, page+2); p++) {
            html += `<button class="page-btn${p===page?' active':''}" onclick="Shop.loadListings(${p})">${p}</button>`;
        }
        if (page < pages) html += `<button class="page-btn" onclick="Shop.loadListings(${page+1})">&#x2192;</button>`;
        pag.innerHTML = html;
    }

    async function showListing(listingId) {
        document.getElementById('grid-page').style.display = 'none';
        const dp = document.getElementById('detail-page');
        dp.style.display = 'block';
        document.getElementById('detail-content').innerHTML = '<div class="loading">Loading...</div>';
        window.scrollTo(0, 0);

        const r = await fetch('/shop/listings/' + listingId);
        if (!r.ok) { document.getElementById('detail-content').innerHTML = '<p>Item not found.</p>'; return; }
        const l = await r.json();

        // Update page URL without reload
        history.pushState({listing: listingId}, '', '?listing=' + listingId);

        const photos = l.photos || [];
        const primaryPhoto = photos.find(p => p.is_primary) || photos[0];

        const fields = [
            ['Category', l.category], ['Era', l.era], ['Maker / Artist', l.maker],
            ['Origin', l.origin], ['Material', l.material], ['Condition', l.condition],
            ['Auction ends', l.auction_end ? l.auction_end.slice(0,10) : ''],
        ].filter(([,v]) => v);

        document.getElementById('detail-content').innerHTML = `
<div class="detail-grid">
  <div>
    ${photos.length
      ? `<img id="main-photo" class="photo-main" src="${esc(primaryPhoto.url)}" alt="${esc(l.title)}"
            onclick="Shop.openLightbox('${esc(primaryPhoto.url)}','${esc(primaryPhoto.caption)}')">`
      : `<div class="photo-placeholder">&#x1F3FA;</div>`}
    ${photos.length > 1 ? `<div class="photo-thumbs" id="photo-thumbs">
      ${photos.map((p,i) => `<img class="photo-thumb${i===0?' active':''}" src="${esc(p.url)}"
        data-url="${esc(p.url)}" data-caption="${esc(p.caption)}"
        onclick="Shop.switchPhoto(this,'${esc(p.url)}','${esc(p.caption)}')"
        loading="lazy">`).join('')}
    </div>` : ''}
  </div>
  <div>
    <h1 class="detail-title">${esc(l.title)}</h1>
    <div class="detail-price">${usd(l.price)}
      <span class="price-type">${l.list_type === 'auction' ? '— Auction' : '— Fixed price'}</span>
    </div>
    <div class="detail-fields">
      ${fields.map(([k,v]) => `<span class="field-label">${esc(k)}</span><span class="field-value">${esc(v)}</span>`).join('')}
    </div>
    ${l.description ? `<div class="detail-desc"><h3>Description</h3><p>${esc(l.description)}</p></div>` : ''}
    ${l.provenance   ? `<div class="detail-desc"><h3>Provenance</h3><p>${esc(l.provenance)}</p></div>` : ''}
    ${l.listing_url  ? `<p style="margin-bottom:16px"><a href="${esc(l.listing_url)}" target="_blank" style="font-size:13px">View on ${esc(l.channel)} &#x2197;</a></p>` : ''}

    <!-- Inquiry form -->
    <div class="inquiry-card">
      <h3>Contact the dealer</h3>
      <div id="inq-msg-${listingId}"></div>
      <div id="inq-form-${listingId}">
        <div class="form-row">
          <div class="fg"><label>Your name *</label><input type="text" id="inq-name" placeholder="Full name"></div>
          <div class="fg"><label>Phone</label><input type="text" id="inq-phone" placeholder="Optional"></div>
        </div>
        <div class="fg"><label>Email address *</label><input type="email" id="inq-email" placeholder="you@example.com"></div>
        <div class="fg"><label>Subject</label><input type="text" id="inq-subject" placeholder="Question about this item..."></div>
        <div class="fg"><label>Message *</label><textarea id="inq-body" placeholder="I'm interested in this item. Could you tell me more about..."></textarea></div>
        <button class="btn-inquire" onclick="Shop.submitInquiry(${listingId})">Send inquiry</button>
      </div>
    </div>

    <!-- Thread viewer (shown after inquiry submitted) -->
    <div id="thread-section-${listingId}" class="thread-section" style="display:none"></div>
  </div>
</div>`;

        // Pre-check localStorage for saved inquiry id for this listing
        const savedId = localStorage.getItem('inq_' + listingId);
        if (savedId) loadThread(listingId, savedId);
    }

    async function submitInquiry(listingId) {
        const name  = document.getElementById('inq-name')?.value.trim();
        const email = document.getElementById('inq-email')?.value.trim();
        const body  = document.getElementById('inq-body')?.value.trim();
        const phone = document.getElementById('inq-phone')?.value.trim();
        const subj  = document.getElementById('inq-subject')?.value.trim();
        const msgEl = document.getElementById('inq-msg-' + listingId);

        if (!name || !email || !body) {
            msgEl.innerHTML = '<div class="inquiry-error">Name, email, and message are required.</div>';
            return;
        }
        const r = await fetch('/api/inquiries', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                listing_id: parseInt(listingId),
                buyer_name: name, buyer_email: email,
                buyer_phone: phone, subject: subj, body
            })
        });
        const data = await r.json();
        if (!r.ok) {
            msgEl.innerHTML = '<div class="inquiry-error">Error: ' + esc(data.error||'send failed') + '</div>';
            return;
        }
        // Save inquiry id so buyer can see replies on return
        localStorage.setItem('inq_' + listingId, data.id);
        document.getElementById('inq-form-' + listingId).style.display = 'none';
        msgEl.innerHTML = '<div class="inquiry-success">&#x2713; Your inquiry has been sent! The dealer will reply by email and the conversation will appear below.</div>';
        loadThread(listingId, data.id);
    }

    async function loadThread(listingId, inquiryId) {
        const r = await fetch('/api/inquiries/' + inquiryId);
        if (!r.ok) return;
        const inq = await r.json();
        const replies = inq.replies || [];
        const section = document.getElementById('thread-section-' + listingId);
        if (!section) return;
        section.style.display = '';
        section.innerHTML = `<h3>Conversation</h3>
<div id="thread-msgs-${inquiryId}">
  <div class="thread-msg buyer">
    <div class="msg-meta">You &middot; ${esc((inq.created_at||'').slice(0,10))}</div>
    <div class="msg-body">${esc(inq.body)}</div>
  </div>
  ${replies.map(rep => `
  <div class="thread-msg ${rep.author_role === 'buyer' ? 'buyer' : 'dealer'}">
    <div class="msg-meta">${rep.author_role === 'buyer' ? 'You' : 'Dealer'} &middot; ${esc((rep.created_at||'').slice(0,16).replace('T',' '))}</div>
    <div class="msg-body">${esc(rep.body)}</div>
  </div>`).join('')}
</div>
<div class="thread-reply-box">
  <textarea id="thread-reply-body-${inquiryId}" placeholder="Continue the conversation..."></textarea>
  <button class="btn-reply" onclick="Shop.postBuyerReply(${inquiryId})">Send</button>
</div>`;
    }

    async function postBuyerReply(inquiryId) {
        const ta = document.getElementById('thread-reply-body-' + inquiryId);
        const body = ta?.value?.trim();
        if (!body) return;
        // Get buyer name from original inquiry display
        const r = await fetch('/api/inquiries/' + inquiryId + '/replies', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ body })
        });
        if (!r.ok) { alert('Error sending reply'); return; }
        const data = await r.json();
        ta.value = '';
        const msgs = document.getElementById('thread-msgs-' + inquiryId);
        if (msgs) {
            const d = document.createElement('div');
            d.className = 'thread-msg buyer';
            d.innerHTML = '<div class="msg-meta">You &middot; just now</div>' +
                          '<div class="msg-body">' + esc(body) + '</div>';
            msgs.appendChild(d);
        }
    }

    function switchPhoto(thumb, url, caption) {
        const main = document.getElementById('main-photo');
        if (main) {
            main.src = url;
            main.onclick = () => openLightbox(url, caption);
        }
        document.querySelectorAll('.photo-thumb').forEach(t => t.classList.remove('active'));
        thumb.classList.add('active');
    }

    function openLightbox(url, caption) {
        document.getElementById('lb-img').src = url;
        document.getElementById('lb-caption').textContent = caption || '';
        document.getElementById('lightbox').style.display = 'flex';
    }

    function closeLightbox(e) {
        if (!e || e.target !== document.getElementById('lb-img'))
            document.getElementById('lightbox').style.display = 'none';
    }

    function showGrid() {
        document.getElementById('detail-page').style.display = 'none';
        document.getElementById('grid-page').style.display = '';
        history.pushState({}, '', location.pathname);
        window.scrollTo(0, 0);
    }

    function filterCat(cat) {
        state.cat = cat;
        document.querySelectorAll('.cat-item').forEach(el => {
            el.classList.toggle('active', el.dataset.cat === cat);
        });
        loadListings(1);
    }

    function search() {
        state.q = document.getElementById('search-input').value.trim();
        loadListings(1);
    }

    window.addEventListener('popstate', e => {
        if (e.state?.listing) showListing(e.state.listing);
        else showGrid();
    });

    return { init, loadListings, showListing, submitInquiry, postBuyerReply,
             switchPhoto, openLightbox, closeLightbox, showGrid, filterCat, search };
})();

document.addEventListener('DOMContentLoaded', Shop.init);
</script>
</body>
</html>
